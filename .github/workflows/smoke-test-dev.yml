name: Development Smoke Test
on:
  workflow_call:
jobs:
  dev-smoke-tests:
    runs-on: [self-hosted, hmpps-github-actions-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup K6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1
      - name: Run main Smoke Test script
        shell: bash
        env:
          DOMAIN: prisoner-finance-dev.hmpps.service.justice.gov.uk
        run: |
          k6 run --summary-mode=full --quiet ./scripts/K6/smoke-tests.js
